<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>卓球SNSアプリ概要</title>
  <style>
    body {
      font-family: "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f0f0f0;
    }
    header {
      background-color: #e32929;
      color: #fff;
      padding: 1rem;
      text-align: center;
    }
    main {
      max-width: 800px;
      margin: 1rem auto;
      background-color: #fff;
      padding: 1.5rem;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }
    h2 {
      color: #e32929;
    }
    ul {
      padding-left: 1.2rem;
    }
    footer {
      text-align: center;
      font-size: 0.9rem;
      margin-top: 2rem;
      color: #888;
    }
  </style>
</head>
<body>
  <header>
    <h1>卓球プレイヤー向けSNSアプリ (仮)</h1>
  </header>
  <main>
    <section>
      <h2>主な機能</h2>
      <ul>
        <li>練習・試合・筋トレ・ストレッチなどの動画や写真の投稿・共有</li>
        <li>フォロワーによるリアクション機能 (いいね・コメントなど)</li>
        <li>練習スケジュール管理とカレンダー表示</li>
        <li>フォロー中のユーザーの練習履歴をカレンダーで閲覧</li>
        <li>卓球関連コラムをまとめたマガジン機能</li>
        <li>時間と場所を設定した練習相手募集機能</li>
      </ul>
    </section>
    <section>
      <h2>今後の展望</h2>
      <p>将来的には、動画解析を用いたフォームチェックや、ランキング機能なども追加予定です。</p>
    </section>
  </main>
  <footer>
    &copy; 2025 卓球SNSプロジェクト
  </footer>
</body>
</html>
